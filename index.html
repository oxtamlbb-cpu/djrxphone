<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IMEI Unlock Service</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {font-family:'Poppins',sans-serif;margin:0;background:#0b1220;color:#e5e7eb;}
    header {background:linear-gradient(90deg,#0ea5e9,#22c55e);padding:20px;text-align:center;font-size:24px;color:white;}
    .container {max-width:520px;margin:40px auto;background:#111827;padding:30px;border-radius:18px;box-shadow:0 15px 40px rgba(0,0,0,0.6);}    
    .step {display:none;}
    .step.active {display:block;}
    .form-group {margin-bottom:18px;}
    label {font-size:13px;color:#9ca3af;display:block;margin-bottom:6px;}
    .input-box {display:flex;align-items:center;background:#1f2937;border-radius:10px;padding:10px;}
    .input-box input, .input-box select {background:transparent;border:none;outline:none;color:white;width:100%;}
    button {width:100%;padding:14px;border-radius:12px;border:none;font-weight:600;margin-top:10px;cursor:pointer;}
    .next {background:#22c55e;color:#052e16;}
    .back {background:#374151;color:white;}
    .result {background:#1f2937;padding:15px;border-radius:10px;margin-top:20px;text-align:center;}
    .progress {height:6px;background:#1f2937;border-radius:10px;margin-bottom:20px;overflow:hidden;}
    .progress-bar {height:100%;background:#22c55e;width:33%;transition:0.3s;}
    .qris img {width:200px;margin-top:15px;border-radius:10px;}
    .wa-btn {background:#25D366;color:white;margin-top:15px;}
  </style>
</head>
<body>

<header>IMEI Unlock Professional Service</header>

<div class="container">
  <div class="progress"><div class="progress-bar" id="progress"></div></div>

  <!-- STEP 1 -->
  <div class="step active" id="step1">
    <div class="form-group">
      <label>Masukkan IMEI</label>
      <div class="input-box">
        <input type="text" id="imei" placeholder="15 digit IMEI">
      </div>
    </div>
    <button class="next" onclick="nextStep(2)">Lanjut</button>
  </div>

  <!-- STEP 2 -->
  <div class="step" id="step2">
    <div class="form-group">
      <label>Pilih Layanan</label>
      <div class="input-box">
        <select id="service">
          <option value="3 Bulan">Reguler (3 Bulan)</option>
          <option value="1 Bulan">Express (1 Bulan)</option>
        </select>
      </div>
    </div>
    <button class="back" onclick="nextStep(1)">Kembali</button>
    <button class="next" onclick="nextStep(3)">Lanjut</button>
  </div>

  <!-- STEP 3 -->
  <div class="step" id="step3">
    <h3>Konfirmasi Data</h3>
    <div id="summary"></div>
    <button class="back" onclick="nextStep(2)">Kembali</button>
    <button class="next" onclick="goToPayment()">Order & Bayar</button>
  </div>

  <!-- STEP 4 PAYMENT -->
  <div class="step" id="step4">
    <h3>Pembayaran QRIS</h3>
    <div class="result qris">
      Scan QRIS untuk pembayaran<br>
      <img src="https://upload.wikimedia.org/wikipedia/commons/5/5f/QR_Code_example.png">
      <p>Setelah bayar, klik tombol di bawah</p>
      <button class="wa-btn" onclick="redirectWA()">Saya Sudah Bayar</button>
    </div>
  </div>

</div>

<script>
const adminNumber = "6289515729536"; // GANTI dengan nomor WA kamu

function nextStep(step) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById('step'+step).classList.add('active');
  document.getElementById('progress').style.width = (step*25) + '%';

  if(step === 3){
    document.getElementById('summary').innerHTML = `IMEI: ${imei.value}<br>Layanan: ${service.value}`;
  }
}

function goToPayment(){
  nextStep(4);

  // optional auto redirect setelah 10 detik
  setTimeout(() => {
    redirectWA();
  }, 10000);
}

function redirectWA(){
  let message = `Halo admin, saya sudah melakukan pembayaran.%0AIMEI: ${imei.value}%0ALayanan: ${service.value}`;
  window.location.href = `https://wa.me/6289515729536${adminNumber}?text=${message}`;
}
</script>

</body>
</html>
