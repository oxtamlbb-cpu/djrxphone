<!DOCTYPE html>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:Poppins;
    background:#03040a;
    color:white;
    overflow-x:hidden;
}

/* ================= LOADER ================= */
#loader{
position:fixed;
width:100%;
height:100%;
background:#03040a;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:9999;
}
.loader-logo{
font-family:Orbitron;
font-size:40px;
color:#00f0ff;
margin-bottom:30px;
animation:pulse 1.5s infinite;
}
@keyframes pulse{
0%{opacity:.5}50%{opacity:1}100%{opacity:.5}
}
.progress{
width:220px;height:6px;background:#111;border-radius:10px;
overflow:hidden;
}
.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#00f0ff,#7a5cff);
animation:loading 2.5s forwards;
}
@keyframes loading{
to{width:100%}
}

/* PARTICLES */
#particles{position:fixed;width:100%;height:100%;z-index:-1}

/* NAV */
nav{display:flex;justify-content:space-between;padding:20px 10%;background:#00000070;backdrop-filter:blur(10px)}
.logo{font-family:Orbitron;font-size:28px;color:#00f0ff}

/* HERO */
.hero{text-align:center;padding:120px 20px 80px}
.hero h1{font-family:Orbitron;font-size:60px;
background:linear-gradient(90deg,#00f0ff,#7a5cff);
-webkit-background-clip:text;color:transparent;}
.cta{padding:15px 35px;border:none;border-radius:40px;
background:linear-gradient(90deg,#00f0ff,#7a5cff);color:white;font-weight:bold}

/* SECTIONS */
.stats{display:flex;justify-content:center;gap:80px;padding:40px;background:#ffffff05}
.container{padding:80px 10%;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:35px}
.card{background:#ffffff05;padding:35px;border-radius:25px;border:1px solid #00f0ff33}
button{width:100%;padding:12px;border:none;border-radius:12px;background:linear-gradient(90deg,#00f0ff,#7a5cff);color:white}

footer{text-align:center;padding:40px;opacity:.6}
.wa{position:fixed;bottom:25px;right:25px;background:#25D366;width:65px;height:65px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px}
</style>
</head>

<body>

<!-- LOADING SCREEN -->
<div id="loader">
<div class="loader-logo">⚡ DJRX PHONE</div>
<div class="progress"><div class="bar"></div></div>
</div>

<canvas id="particles"></canvas>

<div class="card">iCloud A12+ Rp200K<button onclick="order()">ORDER</button></div>
<div class="card">Samsung Frp OS 16 Rp100K<button onclick="order()">ORDER</button></div>
<div class="card">Samsung Exynos Frp Remote<button onclick="order()">ORDER</button></div>
</section>

<footer>© DJRX PHONE</footer>
<a class="wa" href="https://wa.me/6289515729536">💬</a>

<script>
// hide loader after load
window.onload = () => {
setTimeout(()=>document.getElementById("loader").style.display="none",2600);
}

// whatsapp
function order(){window.open("https://wa.me/6289515729536","_blank");}

// particles
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;canvas.height=innerHeight;
let p=[];for(let i=0;i<70;i++){p.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,s:Math.random()*2,vx:(Math.random()-.5)*.5,vy:(Math.random()-.5)*.5})}
function anim(){ctx.clearRect(0,0,canvas.width,canvas.height);p.forEach(a=>{a.x+=a.vx;a.y+=a.vy;ctx.fillStyle="#00f0ff";ctx.fillRect(a.x,a.y,a.s,a.s)});requestAnimationFrame(anim)}
anim();
</script>

</body>
</html>
