<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJRX PHONE - Premium Unlock Services</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: {
                        brand: { 400: '#38acf5', 500: '#0e91e9', 600: '#0273c7' },
                        darkbg: '#0B1120',
                        darkcard: '#161E31'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0B1120;
            background-image: radial-gradient(at 10% 10%, rgba(14, 145, 233, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
        }
        .loader { border-top-color: #38acf5; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .animate-field { animation: slideDown 0.3s ease-out forwards; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-gray-100 antialiased font-sans">

    <div class="relative z-10 flex flex-col min-h-screen">
        <!-- Header -->
        <header class="w-full border-b border-gray-800 bg-darkbg/80 backdrop-blur-sm sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <div class="w-3 h-8 bg-brand-500 rounded-full"></div>
                    <h1 class="text-2xl font-extrabold tracking-tighter text-white">DJRX<span class="text-brand-400">PHONE</span></h1>
                </div>
                <div class="flex items-center gap-2 bg-green-500/10 text-green-400 px-3 py-1 rounded-full text-xs font-semibold border border-green-500/20">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                    </span>
                    Service Online
                </div>
            </div>
        </header>

        <main class="flex-grow flex items-center justify-center p-6">
            <div class="w-full max-w-xl">
                <div class="text-center mb-10">
                    <h2 class="text-4xl font-extrabold tracking-tight text-white leading-tight">Instant <span class="text-brand-400">Unlock</span> Solutions.</h2>
                    <p class="text-gray-400 mt-4">Pilih layanan di bawah untuk memulai proses unlock.</p>
                </div>

                <div class="bg-darkcard p-8 rounded-3xl shadow-2xl border border-gray-800 relative overflow-hidden">
                    <div class="space-y-6">
                        <!-- Pilih Layanan -->
                        <div>
                            <label class="block mb-2 text-sm font-medium text-gray-300">Pilih Layanan</label>
                            <select id="layanan" class="w-full p-4 rounded-xl bg-darkbg border border-gray-700 focus:border-brand-500 text-white transition-all outline-none" onchange="toggleFields()">
                                <option value="">-- Pilih Layanan --</option>
                                <optgroup label="IMEI Service">
                                    <option value="IMEI 3 BULAN">IMEI 3 BULAN (Pop-up S&K)</option>
                                </optgroup>
                                <optgroup label="FRP Service (UltraViewer)">
                                    <option value="FRP XIAOMI/POCO">FRP XIAOMI/POCO - Rp 100.000</option>
                                    <option value="FRP SAMSUNG ALL OS16">FRP SAMSUNG ALL OS16 - Rp 100.000</option>
                                    <option value="FRP TECNO/INFINIX/ITEL">FRP TECNO/INFINIX/ITEL - Rp 100.000</option>
                                    <option value="FRP REALME">FRP REALME - Rp 100.000</option>
                                    <option value="FRP IPHONE 6-X">FRP IPHONE 6-X - Rp 100.000</option>
                                    <option value="FRP IPHONE XR-17PM">FRP IPHONE XR-17PM - Rp 200.000</option>
                                </optgroup>
                                <optgroup label="FRP Service (IMEI)">
                                    <option value="FRP SAMSUNG BY IMEI">FRP SAMSUNG BY IMEI - Rp 500rb - 750rb</option>
                                </optgroup>
                            </select>
                        </div>

                        <!-- Input Dinamis -->
                        <div id="field-imei" class="hidden animate-field">
                            <label class="block mb-2 text-sm font-medium text-gray-300">Masukkan IMEI / Serial Number</label>
                            <input type="text" id="val-imei" class="w-full p-4 rounded-xl bg-darkbg border border-gray-700 focus:border-brand-500 text-white outline-none" placeholder="15 digit angka">
                        </div>
                        
                        <div id="field-uv" class="hidden animate-field space-y-4">
                            <div>
                                <label class="block mb-2 text-sm font-medium text-gray-300">ID UltraViewer</label>
                                <input type="text" id="val-uv-id" class="w-full p-4 rounded-xl bg-darkbg border border-gray-700 focus:border-brand-500 text-white outline-none" placeholder="ID">
                            </div>
                            <div>
                                <label class="block mb-2 text-sm font-medium text-gray-300">Password UltraViewer</label>
                                <input type="text" id="val-uv-pass" class="w-full p-4 rounded-xl bg-darkbg border border-gray-700 focus:border-brand-500 text-white outline-none" placeholder="Password">
                            </div>
                        </div>

                        <button onclick="prosesOrder()" class="w-full flex items-center justify-center gap-3 bg-brand-600 hover:bg-brand-500 text-white font-bold py-4 px-6 rounded-xl transition duration-300 shadow-lg shadow-brand-600/20">
                            ORDER SEKARANG VIA WHATSAPP
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Loading -->
    <div id="modal-loading" class="fixed inset-0 bg-darkbg/90 backdrop-blur-sm hidden flex-col items-center justify-center z-[100]">
        <div class="loader rounded-full border-4 border-t-4 border-gray-700 h-12 w-12 mb-4"></div>
        <p class="text-white font-semibold">Menghubungkan ke WhatsApp...</p>
    </div>

    <!-- Modal S&K -->
    <div id="modal-sk" class="fixed inset-0 bg-black/70 backdrop-blur-sm hidden items-center justify-center p-4 z-[90]">
        <div class="bg-darkcard p-8 rounded-3xl max-w-md w-full border border-gray-700 shadow-2xl">
            <h2 class="text-2xl font-bold text-white mb-4">Syarat & Ketentuan</h2>
            <div class="space-y-3 text-gray-300 text-sm mb-6">
                <p>1. Estimasi pengerjaan <span class="text-brand-400">1-24 jam</span>.</p>
                <p>2. <span class="text-red-400">Tidak ada refund</span> jika salah input IMEI.</p>
                <p>3. Garansi sinyal 3 bulan.</p>
            </div>
            <button onclick="closeSK()" class="w-full bg-white text-darkbg py-3 rounded-xl font-bold hover:bg-gray-200 transition">SAYA SETUJU</button>
        </div>
    </div>

    <script>
        // GANTI NOMOR WHATSAPP DI BAWAH INI (Contoh: 628123456789)
        const NO_WHATSAPP = "6289515729536"; 

        function toggleFields() {
            const layanan = document.getElementById('layanan').value;
            const fImei = document.getElementById('field-imei');
            const fUv = document.getElementById('field-uv');
            
            fImei.classList.add('hidden');
            fUv.classList.add('hidden');

            if (layanan === "IMEI 3 BULAN") {
                document.getElementById('modal-sk').classList.replace('hidden', 'flex');
                fImei.classList.remove('hidden');
            } else if (layanan === "FRP SAMSUNG BY IMEI") {
                fImei.classList.remove('hidden');
            } else if (layanan !== "") {
                fUv.classList.remove('hidden');
            }
        }

        function closeSK() {
            document.getElementById('modal-sk').classList.replace('flex', 'hidden');
        }

        function prosesOrder() {
            const layanan = document.getElementById('layanan').value;
            const imei = document.getElementById('val-imei').value;
            const uvId = document.getElementById('val-uv-id').value;
            const uvPass = document.getElementById('val-uv-pass').value;

            if (!layanan) return alert("Pilih layanan terlebih dahulu!");

            // Cek jika field sedang ditampilkan maka wajib diisi
            if (!document.getElementById('field-imei').classList.contains('hidden') && !imei) {
                return alert("Mohon isi IMEI!");
            }
            if (!document.getElementById('field-uv').classList.contains('hidden') && (!uvId || !uvPass)) {
                return alert("Mohon isi data UltraViewer!");
            }

            document.getElementById('modal-loading').classList.remove('hidden');

            setTimeout(() => {
                let pesan = `Halo Admin DJRX PHONE, saya ingin order:\n\n` +
                            `➡️ *Layanan:* ${layanan}\n`;
                
                if (imei) pesan += `🆔 *IMEI/SN:* ${imei}\n`;
                if (uvId) pesan += `🖥️ *ID UV:* ${uvId}\n🔑 *Pass UV:* ${uvPass}\n`;
                
                pesan += `\nMohon totalan harganya. Terima kasih.`;
                
                const url = `https://wa.me/${6289515729536}?text=${encodeURIComponent(pesan)}`;
                
                window.location.href = url;
                
                setTimeout(() => {
                    document.getElementById('modal-loading').classList.add('hidden');
                }, 2000);
            }, 1000);
        }
    </script>
</body>
</html>
